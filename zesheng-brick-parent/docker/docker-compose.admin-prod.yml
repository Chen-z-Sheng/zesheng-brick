# 管理端 + MySQL + Redis（prod，网络 zesheng-net）
# 启动：docker compose --env-file .env.docker.prod -f docker-compose.admin-prod.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: zesheng-prod-mysql
    env_file:
      - .env.docker.prod
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: zesheng_brick
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - zesheng_prod_mysql_data:/var/lib/mysql
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s
    networks:
      - zesheng-net

  redis:
    image: redis:7-alpine
    container_name: zesheng-prod-redis
    env_file:
      - .env.docker.prod
    ports:
      - "6379:6379"
    command:
      - sh
      - -c
      - 'exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'
    networks:
      - zesheng-net

  zesheng-admin:
    image: zesheng-admin:0.0.1-SNAPSHOT
    container_name: zesheng-prod-admin
    env_file:
      - .env.docker.prod
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "9068:9068"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Shanghai
      DB_URL: jdbc:mysql://mysql:3306/zesheng_brick?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DATABASE: "0"
    networks:
      - zesheng-net

volumes:
  zesheng_prod_mysql_data:

networks:
  zesheng-net:
    external: true
