# 开发环境模板（可提交仓库）。使用方式：复制为 application-dev.yml 后填写本地密钥
#   cp application-dev.example.yml application-dev.yml
# application-dev.yml 已在仓库根 .gitignore 中忽略，勿提交。
spring:
  application:
    name: zesheng-brick-springboot-service

  web:
    resources:
      add-mappings: false
  security:
    user:
      name: disabled
      password: disabled
  messages:
    basename: ValidationMessages
    encoding: UTF-8

server:
  port: 9099
  servlet:
    context-path: /api/client

management:
  endpoints:
    web:
      exposure:
        include: health,info

kuaidi100:
  enabled: ${KUAIDI100_ENABLED:true}
  key: ${KUAIDI100_KEY:}
  customer: ${KUAIDI100_CUSTOMER:}
  subscribe-salt: ${KUAIDI100_SUBSCRIBE_SALT:}

zesheng:
  admin:
    api-base: ${ZESHENG_ADMIN_API_BASE:http://127.0.0.1:9068/api/admin}
  internal:
    recycle-market-api-key: ${ZESHENG_RECYCLE_INTERNAL_KEY:zesheng-dev-recycle-internal-key}
  http-client:
    connect-timeout: 5s
    read-timeout: 25s

system:
  jwt:
    secret: ${JWT_SECRET:CZK_2026_8888_CZK_2026_8888_CZK_2026_8888}
    expire: 7200000
    refresh-expire: 604800000
  database:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/zesheng_brick?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout-ms: 30000
      idle-timeout-ms: 600000
      max-lifetime-ms: 1800000
      pool-name: zesheng-client-hikari-dev
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: 10000
    pool:
      max-active: 8
      max-idle: 8
      min-idle: 0
      max-wait: 1000

wx:
  miniapp:
    appid: ${WX_APPID:}
    secret: ${WX_SECRET:}
  donut:
    appid: ${WX_DONUT_APPID:}
    appsecret: ${WX_DONUT_APPSECRET:}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:https://oss-cn-shenzhen.aliyuncs.com}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${OSS_BUCKET_NAME:zesheng-brick}
    dir-prefix: uploads
    max-file-size: 10485760
    part-size: 1048576
    upload-concurrency: 3
  sms:
    enabled: ${ALIYUN_SMS_ENABLED:true}
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
    endpoint: ${ALIYUN_SMS_ENDPOINT:dysmsapi.aliyuncs.com}
    sign-name: ${ALIYUN_SMS_SIGN_NAME:普定泽晟百货}
    template-code: ${ALIYUN_SMS_TEMPLATE_CODE:SMS_329095040}
    code-expire-seconds: ${ALIYUN_SMS_CODE_EXPIRE_SECONDS:300}
    send-interval-seconds: ${ALIYUN_SMS_SEND_INTERVAL_SECONDS:60}

mybatis-plus:
  type-aliases-package: com.zesheng.common.entity,com.zesheng.entity,com.zesheng.client.entity
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
