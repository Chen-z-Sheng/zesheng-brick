# 生产环境配置
spring:
  application:
    name: zesheng-brick-springboot-service

  web:
    resources:
      add-mappings: false
  security:
    user:
      name: disabled
      password: disabled
  messages:
    basename: ValidationMessages
    encoding: UTF-8
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jackson:
    time-zone: Asia/Shanghai

server:
  port: 9067
  servlet:
    context-path: /api/client
  shutdown: graceful
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: false

kuaidi100:
  enabled: ${KUAIDI100_ENABLED:false}
  key: ${KUAIDI100_KEY:}
  customer: ${KUAIDI100_CUSTOMER:}
  subscribe-salt: ${KUAIDI100_SUBSCRIBE_SALT:}

zesheng:
  admin:
    api-base: ${ZESHENG_ADMIN_API_BASE:http://127.0.0.1:9068/api/admin}
  internal:
    recycle-market-api-key: ${ZESHENG_RECYCLE_INTERNAL_KEY}
  http-client:
    connect-timeout: ${HTTP_CLIENT_CONNECT_TIMEOUT:5s}
    read-timeout: ${HTTP_CLIENT_READ_TIMEOUT:25s}

# 系统配置
system:
  # JWT配置
  jwt:
    secret: ${JWT_SECRET}
    expire: 7200000
    refresh-expire: 604800000
  # 数据库配置
  database:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout-ms: 30000
      idle-timeout-ms: 600000
      max-lifetime-ms: 1800000
      pool-name: zesheng-client-hikari
  # Redis配置
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    password: ${REDIS_PASSWORD}
    database: ${REDIS_DATABASE:0}
    timeout: 10000
    pool:
      max-active: 16
      max-idle: 8
      min-idle: 4
      max-wait: 2000

# API文档配置（生产环境禁用）
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

knife4j:
  enable: false

# 小程序 + 多端身份（生产环境务必用环境变量注入）
wx:
  miniapp:
    appid: ${WX_APPID:}
    secret: ${WX_SECRET:}
  donut:
    appid: ${WX_DONUT_APPID:}
    appsecret: ${WX_DONUT_APPSECRET:}

mybatis-plus:
  # 实体类包路径
  type-aliases-package: com.zesheng.common.entity,com.zesheng.entity,com.zesheng.client.entity
  # XML映射文件位置
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
