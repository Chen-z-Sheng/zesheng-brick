name: Deploy Admin Web to GitHub Pages

on:
    push:
        branches:
            - master
            - main
        paths:
            - 'zesheng-brick-admin-web/**'
            - '.github/workflows/deploy-admin-web.yml'

jobs:
    deploy:
        name: Deploy to GitHub Pages
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: zesheng-brick-admin-web
        steps:
            - name: Checkout
              uses: actions/checkout@v3

            - name: Setup Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: 22
                  registry-url: https://registry.npmjs.org/

            - name: Install pnpm
              run: npm install -g pnpm

            - name: Install dependencies
              run: pnpm install

            - name: Build project
              run: pnpm run build

            - name: Deploy to GitHub Pages
              uses: peaceiris/actions-gh-pages@v3
              with:
                  github_token: ${{ secrets.GH_PAGES_TOKEN }}
                  publish_dir: ./zesheng-brick-admin-web/dist
                  publish_branch: gh-pages
