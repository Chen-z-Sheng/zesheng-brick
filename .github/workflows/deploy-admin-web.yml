name: Deploy Admin Web to GitHub Pages

on:
    push:
        branches:
            - master
            - main
        paths:
            - 'zesheng-brick-admin-web/**'
            - '.github/workflows/deploy-admin-web.yml'

jobs:
    deploy:
        name: Deploy to GitHub Pages
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: zesheng-brick-admin-web
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.6.5

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: zesheng-brick-admin-web/pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build project
              run: pnpm run build

            - name: Deploy to GitHub Pages
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GH_PAGES_TOKEN }}
                  publish_dir: ./zesheng-brick-admin-web/dist
                  publish_branch: gh-pages
